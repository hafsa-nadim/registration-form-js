<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Document</title>
</head>
<body>
  
  <form onsubmit="formSubmit()" align="center">
    <h1>Registration Form :-</h1>

    <label for="name">Name: </label>
    <input type="text" id="name">
    <br><br>

    <label for="fname">Father Name: </label>
    <input type="text" id="fname">
    <br><br>

    <label for="age">Age: </label>
    <input type="number" id="age">
    <br><br>

    <label for="gender">Gender: </label>
    <input type="radio" id="female" value="female" name="gender">Female
    <input type="radio" id="male" value="male" name="gender">Male
    <br><br>

    <label for="phone">Phone No: </label>
    <input type="tel" id="phone">
    <br><br>

    <label for="email">Email: </label>
    <input type="email" id="email">
    <br><br>

    <label for="address">Address: </label>
    <textarea id="address" rows="5" cols="40">Enter Your Address</textarea>
    <br><br>

    <label for="edu">Education: </label>
    <select id="edu">
      <option value="Matric">Matric</option>
      <option value="Intermediate">Intermediate</option>
      <option value="Bachelors">Bachelors</option>
      <option value="Masters">Masters</option>
      <option value="M.phil">M.phill</option>
      <option value="Phd">Phd</option>
    </select>
    <br><br>

    <label for="skills">Skills: </label>
    <select id="skills" multiple size="1">
      <option value="Office Automation">Office Automation</option>
      <option value="Graphic designing">Graphic designing</option>
      <option value="Mern Stack Development">Mern Stack Development</option>
      <option value="App Development">App Development</option>
      <option value="Flutter Development">Flutter Development</option>
      <option value="Digital Marketing">Digital Marketing</option>
      <option value="Devops engineering">Devops engineering</option>
      <option value="Ai and chatbot">Ai and chatbot</option>
    </select>
    <br><br>

    <button type="submit">Submit</button>
    
  </form>
<br><br>

<center>
<button onclick="show()">Show Output</button>
<button onclick="clear()">Clear Output</button>
</center>

  <script src="app.js"></script>
</body>
</html>
